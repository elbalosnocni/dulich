<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Du lịch công ty</title>

<style>
body{margin:0;font-family:sans-serif;background:#f0f2f5}
.header{background:#0d47a1;color:#fff;padding:15px;text-align:center;font-size:18px}
.box{background:#fff;margin:10px;padding:12px;border-radius:12px}
input,select{width:100%;padding:12px;margin-top:6px;border-radius:8px;border:1px solid #ccc}
button{width:100%;padding:14px;background:#0d47a1;color:#fff;border:none;border-radius:10px;margin-top:10px}
.card{padding:10px;border-bottom:1px solid #eee}
.tag{display:inline-block;background:#eee;padding:4px 8px;border-radius:6px;margin:2px}
</style>
</head>

<body>

<div class="header">Đăng ký du lịch công ty</div>

<div class="box">
<input id="kw" placeholder="Tìm tên..." oninput="search()">
<div id="list"></div>
</div>

<div class="box">
<select id="type" onchange="renderFamily()">
<option value="tap_the">Phòng 3 người</option>
<option value="gia_dinh">Phòng gia đình</option>
</select>
</div>

<div class="box" id="familyBox"></div>

<div class="box">
<div id="cost">Chi phí: 0 đ</div>
<button onclick="preview()">Xem lại</button>
</div>

<div class="box" id="preview"></div>

<script>
const API="LINK_APPS_SCRIPT";

let nv=null;
let family=[];

// SEARCH
async function search(){
  let r=await fetch(API+"?action=search&kw="+kw.value);
  let d=await r.json();

  list.innerHTML=d.map(x=>
    `<div class="card" onclick='pick(${JSON.stringify(x)})'>
      ${x[2]} (${x[0]})
    </div>`).join("");
}

function pick(x){
  nv=x;
  calc();
}

// FAMILY UI
function renderFamily(){
  if(type.value!="gia_dinh"){
    familyBox.innerHTML="";
    return;
  }

  familyBox.innerHTML=`
  <button onclick="add()">+ Thêm người thân</button>
  <div id="famList"></div>
  `;
}

function add(){
  let name=prompt("Tên:");
  let tuoi=prompt("Tuổi:");

  family.push({name,tuoi:Number(tuoi)});
  drawFam();
  calc();
}

function drawFam(){
  famList.innerHTML=family.map(p=>
    `<div class="tag">${p.name} (${p.tuoi})</div>`
  ).join("");
}

// COST
function calc(){
  if(!nv) return;

  let t = nv[7]=="Có"?1100000:2100000;

  family.forEach(p=>{
    t += p.tuoi>=11?3100000:1550000;
  });

  cost.innerText="Chi phí: "+t.toLocaleString()+" đ";
}

// PREVIEW
function preview(){
  if(!nv) return alert("Chọn NV");

  preview.innerHTML=`
  <b>${nv[2]}</b><br>
  Mã NV: ${nv[0]}<br>
  <button onclick="submit()">Xác nhận đăng ký</button>
  `;
}

// SUBMIT
async function submit(){
  let body={
    maNV:nv[0],
    ten:nv[2],
    gioiTinh:nv[3],
    congDoan:nv[7],
    loaiPhong:type.value,
    family,
    treEm:family.filter(x=>x.tuoi<11).length
  };

  let r=await fetch(API,{method:"POST",body:JSON.stringify(body)});
  let d=await r.json();

  if(d.status){
    alert("Thành công - "+d.cost.toLocaleString());
    location.reload();
  }else alert(d.msg);
}
</script>

</body>
</html>
