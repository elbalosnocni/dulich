<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <h2>ĐĂNG KÝ DU LỊCH 2026</h2>
        
        <div class="card">
            <label>Tìm tên hoặc Mã NV (không dấu):</label>
            <input type="text" id="search" placeholder="Ví dụ: nva hoặc CH021...">
            <div id="result-list" class="search-results"></div>
        </div>

        <div id="info-card" class="card hidden">
            <h3 id="display-name"></h3>
            <p id="display-detail"></p>
            <hr>
            <label>Chọn loại đăng ký:</label>
            <select id="reg-type" onchange="calculate()">
                <option value="1100000" id="opt-cd">Bản thân (Đoàn viên: 1.1tr)</option>
                <option value="2100000" id="opt-kcd">Bản thân (Không ĐV: 2.1tr)</option>
            </select>
            
            <label>Người thân đi kèm:</label>
            <div class="row">
                <span>Trẻ em (6-10t): 1.55tr</span>
                <input type="number" id="child" value="0" min="0" onchange="calculate()">
            </div>
            <div class="row">
                <span>Người lớn (≥11t): 3.1tr</span>
                <input type="number" id="adult" value="0" min="0" onchange="calculate()">
            </div>

            <label>Gợi ý xếp phòng:</label>
            <select id="room-type">
                <option value="Tu dong">Hệ thống tự xếp (Cùng giới tính)</option>
                <option value="Gia dinh">Phòng Gia đình (Ở riêng)</option>
            </select>

            <div class="total-box">
                Tổng tiền: <span id="total-price">0</span> đ
            </div>
            <button onclick="submitData()" id="btn-submit">XÁC NHẬN ĐĂNG KÝ</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
