<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Du Lịch 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ĐĂNG KÝ DU LỊCH 2026</h2>
        
        <div class="card">
            <label>Tìm tên NV:</label>
            <input type="text" id="search" placeholder="Nhập từ khóa...">
            <div id="result"></div> </div>

        <div class="card">

            <h3>Chọn hình thức phòng</h3>
            
            <label><input type="radio" name="roomType" value="auto" checked> Ghép tự động</label><br>
            
            <label><input type="radio" name="roomType" value="manual"> Chọn người ở cùng</label><br>
            
            <label><input type="radio" name="roomType" value="family"> Ở với gia đình</label>
            
            <div id="mateBox" style="display:none;">
           <input type="text" id="mateSearch" placeholder="Nhập tên người muốn ở cùng">
           <div id="mateResult"></div>
           <div id="mateList"></div>
        </div>
        
        <div id="familyFields" style="display:none; border-left: 3px solid #4CAF50; padding-left: 10px;">
            <div>Số người thân đi kèm (>=11t) - 3.1tr:</div>
            <input type="number" id="adult" value="0" min="0">
            
            <div>Số trẻ em đi kèm (6-10t) - 1.55tr:</div>
            <input type="number" id="child" value="0" min="0">
        </div>

            <div class="total">
                Tổng tiền: <span id="money" data-value="0">0</span> đ
            </div>
            
            <button onclick="register()" class="btn-submit">XÁC NHẬN ĐĂNG KÝ</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
