<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
background:#f2f2f2;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:15px;
}

input,select,button{
width:100%;
padding:12px;
margin-top:8px;
font-size:16px;
}

button{
background:#2ecc71;
color:white;
border:none;
border-radius:6px;
}

</style>

</head>

<body>

<h2>Đăng ký Du Lịch</h2>

<div class="card">

<input id="search" placeholder="Tìm tên (không dấu)">

<div id="result"></div>

</div>


<div class="card">

<label>Người lớn</label>
<input type="number" id="adult" value="1">

<label>Trẻ em (6-10)</label>
<input type="number" id="child" value="0">

<label>Người thân ≥11</label>
<input type="number" id="family" value="0">

<h3 id="money">0 đ</h3>

<button onclick="register()">Đăng ký</button>

</div>

<script>

let nhanvien=null

document.getElementById("search").oninput = async function(){

const q = this.value

const url="APPS_SCRIPT_URL?action=search&q="+q

const res = await fetch(url)

const data = await res.json()

let html=""

data.slice(0,5).forEach(n=>{

html += `<div onclick='selectNV(${JSON.stringify(n)})'>
${n.ten} (${n.ma})
</div>`

})

document.getElementById("result").innerHTML = html

}

function selectNV(n){

nhanvien=n

document.getElementById("result").innerHTML =
`
<b>${n.ten}</b><br>
${n.bophan} - ${n.chucvu}
`

calc()

}

function calc(){

const adult = +document.getElementById("adult").value
const child = +document.getElementById("child").value
const family = +document.getElementById("family").value

let price = 0

if(nhanvien.congdoan=="Có"){
price += adult*1100000
}else{
price += adult*2100000
}

price += child*1550000
price += family*3100000

document.getElementById("money").innerText =
price.toLocaleString()+" đ"

}

document.querySelectorAll("input").forEach(e=>{
e.oninput=calc
})

async function register(){

const adult = document.getElementById("adult").value
const child = document.getElementById("child").value
const family = document.getElementById("family").value

const tong = document.getElementById("money").innerText

const url="https://script.google.com/macros/s/AKfycbzHR7iYAxL5JBpyJO5mzlZ2CP-CwE1rtjn2iREHbXAVuzr0BNn_P2ntesXk5_Wa0Mzv/exec"+
"&ma="+nhanvien.ma+
"&ten="+nhanvien.ten+
"&gioitinh="+nhanvien.gioitinh+
"&congdoan="+nhanvien.congdoan+
"&nguoilon="+adult+
"&treem="+child+
"&tongtien="+tong

const res = await fetch(url)

const text = await res.text()

if(text=="EXIST"){
alert("Đã đăng ký rồi")
}else{
alert("Đăng ký thành công")
}

}

</script>

</body>
</html>
