<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Du Lịch 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ĐĂNG KÝ DU LỊCH 2026</h2>
        
        <div class="card">
            <label><b>Tìm tên NV:</b></label>
            <input type="text" id="search" placeholder="Nhập tên hoặc mã NV...">
            <div id="result"></div> 
        </div>

        <div class="card">
            <h3>Chọn hình thức phòng</h3>
            
            <div class="radio-group">
                <label><input type="radio" name="roomType" value="auto" checked> Ghép tự động</label><br>
                
                <label><input type="radio" name="roomType" value="manual"> Chọn người ở cùng</label><br>
                
                <label><input type="radio" name="roomType" value="family"> Ở với gia đình</label>
            </div>

            <div id="mateBox" style="display:none; margin-top: 15px;">
                <input type="text" id="mateSearch" placeholder="Nhập tên người muốn ở cùng...">
                <div id="mateResult" class="search-suggestions"></div>
                <div id="mateList"></div>
                <p class="note">* Ghép phòng: Chỉ áp dụng cho người cùng giới tính.</p>
            </div>

            <div id="familyFields" style="display:none; border-left: 4px solid #4CAF50; padding-left: 15px; margin-top: 15px;">
                <div class="input-sub-group">
                    <label><b>Người thân cùng công ty (nếu có):</b></label>
                    <input type="text" id="familyMateSearch" placeholder="Nhập tên/mã người thân cùng cty...">
                    <div id="familyMateResult" class="search-suggestions"></div>
                    <div id="selectedFamilyMate"></div>
                </div>
                
                <hr style="margin: 15px 0; opacity: 0.3;">
                
                <div class="input-sub-group">
                    <label>Người thân ngoài công ty (>=11t): 3.1tr</label>
                    <input type="number" id="adult" value="0" min="0">
                </div>
                
                <div class="input-sub-group">
                    <label>Trẻ em đi kèm (6-10t): 1.55tr</label>
                    <input type="number" id="child" value="0" min="0">
                </div>
                <p class="note">* Phòng gia đình: Được xếp phòng riêng (vợ chồng/người thân).</p>
            </div>

            <div class="total-section">
                Tổng tiền: <span id="money" data-value="0">0</span> đ
            </div>
            
            <button onclick="register()" class="btn-submit">XÁC NHẬN ĐĂNG KÝ</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
