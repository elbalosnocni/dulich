<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Du Lịch 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>ĐĂNG KÝ DU LỊCH 2026</h2>
        
        <div class="card">
            <label>Tìm tên NV:</label>
            <input type="text" id="search" placeholder="Nhập từ khóa...">
            <div id="result"></div> </div>

        <div class="card">

            <h3>Chọn hình thức phòng</h3>
            
            <label><input type="radio" name="roomType" value="auto" checked> Ghép tự động</label><br>
            
            <label><input type="radio" name="roomType" value="manual"> Chọn người ở cùng</label><br>
            
            <label><input type="radio" name="roomType" value="family"> Ở với gia đình</label>
            
            <div id="mateBox" style="display:none; margin-top:10px;">
              <input id="mateSearch" placeholder="Nhập tên người muốn ở cùng">
              <div id="mateResult"></div>
              <div id="mateList"></div>
            </div>
            </div>
        <div class="card">
            <div class="input-group">
                <label>Người lớn đi kèm (>=11t): 3.1tr</label>
                <input type="number" id="adult" value="1" min="1">
            </div>
            
            <div class="input-group">
                <label>Trẻ em (6-10t): 1.55tr</label>
                <input type="number" id="child" value="0" min="0">
            </div>

            <div class="input-group">
                <label>Người thân đi kèm (Phòng gia đình): 3.1tr</label>
                <input type="number" id="family" value="0" min="0">
            </div>

            <div class="total">
                Tổng tiền: <span id="money" data-value="0">0</span> đ
            </div>
            
            <button onclick="register()" class="btn-submit">XÁC NHẬN ĐĂNG KÝ</button>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
