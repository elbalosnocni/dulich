<h3>Dashboard</h3>

<button onclick="load()">Load</button>
<button onclick="room()">Chia phòng</button>

<div id="stats"></div>
<div id="rooms"></div>

<script>
const API="https://script.google.com/macros/s/AKfycbydnC46ulhR_fPb6xYGNWZeHOUb3NKCX9JuxZA_jySRXF4dNvFKtA_t0qnDvksLat6XhA/exec";

async function load(){
  let r=await fetch(API+"?action=stats");
  let d=await r.json();

  stats.innerHTML=`
  Tổng: ${d.tong}<br>
  Trẻ em: ${d.tre}<br>
  Phòng: ${d.phong}
  `;
}

async function room(){
  let r=await fetch(API+"?action=rooms");
  let d=await r.json();

  rooms.innerHTML=d.map(x=>
    `<div>Phòng ${x.room}: ${x.members.join(", ")}</div>`
  ).join("");
}
</script>
